<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'" />
  <title>Catculator</title>
  <meta name="description" content="La calculadora con temática de gatos 🐱" />

  <!-- PWA: renderer.js mantiene theme-color al día con el tema activo -->
  <meta name="theme-color" content="#67e8f9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Catculator" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header class="topbar">
      <div class="brand">
        <span class="brand-paw">🐾</span>
        <h1>Catculator</h1>
      </div>
      <div class="topbar-actions">
        <button id="btn-history" class="icon-btn" title="Historial">🕘</button>
        <button id="btn-conv" class="icon-btn" title="Conversor de unidades">⇄</button>
        <button id="btn-quiz" class="icon-btn" title="Modo aprendiz">🎓</button>
        <button id="btn-sound" class="icon-btn" title="Sonido">🔊</button>
        <button id="btn-theme" class="icon-btn" title="Cambiar color">🎨</button>
      </div>
    </header>

    <!-- Selector de temas -->
    <div id="theme-panel" class="theme-panel hidden">
      <p class="theme-title">Tema de color 🎨</p>
      <div class="theme-grid">
        <button class="theme-swatch" data-theme="cian">
          <span class="dot dot-cian"></span>Cian
        </button>
        <button class="theme-swatch" data-theme="rosa">
          <span class="dot dot-rosa"></span>Rosa
        </button>
        <button class="theme-swatch" data-theme="menta">
          <span class="dot dot-menta"></span>Menta
        </button>
        <button class="theme-swatch" data-theme="lavanda">
          <span class="dot dot-lavanda"></span>Lavanda
        </button>
        <button class="theme-swatch" data-theme="atigrado">
          <span class="dot dot-atigrado"></span>Atigrado
        </button>
        <button class="theme-swatch" data-theme="noche">
          <span class="dot dot-noche"></span>Noche
        </button>
      </div>
      <p class="theme-title sub">Tu pelaje 🐱</p>
      <div class="theme-grid">
        <button class="fur-swatch" data-fur="carbon">
          <span class="dot dot-carbon"></span>Carbón
        </button>
        <button class="fur-swatch" data-fur="naranja">
          <span class="dot dot-naranja"></span>Naranja
        </button>
        <button class="fur-swatch" data-fur="gris">
          <span class="dot dot-gris"></span>Gris
        </button>
        <button class="fur-swatch" data-fur="negro">
          <span class="dot dot-negro"></span>Negro
        </button>
        <button class="fur-swatch" data-fur="blanco">
          <span class="dot dot-blanco"></span>Blanco
        </button>
      </div>
      <p class="theme-title sub">Tu atuendo 🎩</p>
      <div class="theme-grid">
        <button class="outfit-swatch" data-outfit="ninguno">
          <span class="mini">🐱</span>Ninguno
        </button>
        <button class="outfit-swatch" data-outfit="ninja">
          <span class="mini">🥷</span>Ninja
        </button>
        <button class="outfit-swatch" data-outfit="futbol">
          <span class="mini">⚽</span>Futbolero
        </button>
        <button class="outfit-swatch" data-outfit="pirata">
          <span class="mini">🏴‍☠️</span>Pirata
        </button>
        <button class="outfit-swatch" data-outfit="mago">
          <span class="mini">🧙</span>Mago
        </button>
        <button class="outfit-swatch" data-outfit="capucha">
          <span class="mini">🤍</span>Encapuchado
        </button>
      </div>
    </div>

    <!-- Historial de operaciones -->
    <div id="history-panel" class="side-panel hidden">
      <p class="theme-title">Historial 🕘</p>
      <div id="history-list" class="history-list"></div>
      <button id="btn-history-clear" class="panel-action">Borrar historial 🧽</button>
    </div>

    <!-- Conversor de unidades -->
    <div id="conv-panel" class="side-panel hidden">
      <p class="theme-title">Conversor de unidades ⇄</p>
      <select id="conv-cat" class="conv-select"></select>
      <input id="conv-value" class="conv-input" type="number" step="any" inputmode="decimal" placeholder="Número a convertir" />
      <div class="conv-row">
        <select id="conv-from" class="conv-select"></select>
        <button id="conv-swap" class="conv-swap" title="Intercambiar">⇄</button>
        <select id="conv-to" class="conv-select"></select>
      </div>
      <div id="conv-result" class="conv-result">—</div>
      <button id="btn-conv-use" class="panel-action">Usar en la calculadora 🐾</button>
    </div>

    <!-- Bloc de notas -->
    <div id="notes-panel" class="side-panel hidden">
      <p class="theme-title">Bloc de notas 📝</p>
      <textarea id="notes-text" class="notes-textarea"
        placeholder="Apunta aquí tus cuentas, listas o ideas... se guardan solas 🐾"></textarea>
      <div class="notes-row">
        <button id="btn-notes-insert" class="panel-action">➕ Resultado</button>
        <button id="btn-notes-clear" class="panel-action secondary">🧽 Borrar</button>
      </div>
    </div>

    <!-- Escena del gato -->
    <div class="cat-scene">
      <div id="speech" class="speech hidden"><span id="speech-text"></span></div>

      <svg id="cat" viewBox="0 0 220 150" aria-hidden="true">
        <!-- Cola -->
        <path id="tail" d="M195,148 Q215,120 200,95 Q190,80 197,68"
              fill="none" stroke="var(--fur)" stroke-width="14" stroke-linecap="round"/>

        <g id="cat-head">
          <!-- Orejas -->
          <g id="ear-left" class="ear">
            <polygon points="55,58 68,8 96,42" fill="var(--fur)"/>
            <polygon points="63,50 71,22 87,42" fill="var(--ear-inner)"/>
          </g>
          <g id="ear-right" class="ear">
            <polygon points="165,58 152,8 124,42" fill="var(--fur)"/>
            <polygon points="157,50 149,22 133,42" fill="var(--ear-inner)"/>
          </g>

          <!-- Cabeza -->
          <ellipse cx="110" cy="85" rx="62" ry="52" fill="var(--fur)"/>
          <!-- Pelusa de las mejillas -->
          <path d="M50,88 L38,93 L49,99 L39,106 L51,111 Z" fill="var(--fur)"/>
          <path d="M170,88 L182,93 L171,99 L181,106 L169,111 Z" fill="var(--fur)"/>
          <!-- Luz y sombra: el acabado -->
          <ellipse cx="92" cy="62" rx="34" ry="20" fill="#ffffff" opacity="0.14"/>
          <path d="M52,105 Q110,148 168,105 Q140,133 110,133 Q80,133 52,105 Z" fill="#000000" opacity="0.08"/>
          <!-- Contorno cartoon -->
          <ellipse cx="110" cy="85" rx="62" ry="52" fill="none" stroke="var(--fur-line)" stroke-width="2.5" opacity="0.3"/>
          <!-- Rubor -->
          <ellipse cx="70" cy="99" rx="8" ry="4.5" fill="#ff8a9e" opacity="0.3"/>
          <ellipse cx="150" cy="99" rx="8" ry="4.5" fill="#ff8a9e" opacity="0.3"/>

          <!-- Ojos -->
          <g id="eye-left" class="eye">
            <ellipse class="eye-ball" cx="86" cy="78" rx="14" ry="16" fill="var(--eye-color)"/>
            <ellipse cx="86" cy="78" rx="14" ry="16" fill="none" stroke="var(--fur-line)" stroke-width="1.2" opacity="0.35"/>
            <ellipse class="pupil" cx="86" cy="78" rx="5.5" ry="10" fill="#16151a"/>
            <circle class="glint" cx="90" cy="72" r="2.6" fill="#ffffff"/>
            <circle cx="83" cy="83" r="1.3" fill="#ffffff" opacity="0.8"/>
          </g>
          <g id="eye-right" class="eye">
            <ellipse class="eye-ball" cx="134" cy="78" rx="14" ry="16" fill="var(--eye-color)"/>
            <ellipse cx="134" cy="78" rx="14" ry="16" fill="none" stroke="var(--fur-line)" stroke-width="1.2" opacity="0.35"/>
            <ellipse class="pupil" cx="134" cy="78" rx="5.5" ry="10" fill="#16151a"/>
            <circle class="glint" cx="138" cy="72" r="2.6" fill="#ffffff"/>
            <circle cx="131" cy="83" r="1.3" fill="#ffffff" opacity="0.8"/>
          </g>

          <!-- Cejas enojadas (ocultas por defecto) -->
          <g id="angry-brows" class="hidden-part">
            <line x1="72" y1="58" x2="98" y2="68" stroke="var(--fur-line)" stroke-width="5" stroke-linecap="round"/>
            <line x1="148" y1="58" x2="122" y2="68" stroke="var(--fur-line)" stroke-width="5" stroke-linecap="round"/>
          </g>

          <!-- Nariz y boca -->
          <polygon points="104,96 116,96 110,104" fill="var(--nose-color)"/>
          <path id="mouth" d="M100,110 Q105,115 110,110 Q115,115 120,110"
                fill="none" stroke="var(--fur-line)" stroke-width="3" stroke-linecap="round"/>

          <!-- Zzz para dormir -->
          <g id="zzz" class="hidden-part">
            <text x="168" y="40" font-size="20" fill="var(--fur-line)" font-weight="bold">z</text>
            <text x="180" y="28" font-size="14" fill="var(--fur-line)" font-weight="bold">z</text>
            <text x="190" y="18" font-size="10" fill="var(--fur-line)" font-weight="bold">z</text>
          </g>

          <!-- Bigotes -->
          <g stroke="var(--whisker)" stroke-width="2" stroke-linecap="round" opacity="0.9">
            <line x1="58" y1="92" x2="26" y2="86"/>
            <line x1="58" y1="100" x2="24" y2="100"/>
            <line x1="58" y1="108" x2="28" y2="114"/>
            <line x1="162" y1="92" x2="194" y2="86"/>
            <line x1="162" y1="100" x2="196" y2="100"/>
            <line x1="162" y1="108" x2="192" y2="114"/>
          </g>

          <!-- Atuendos (van dentro de la cabeza para heredar sus animaciones) -->
          <g id="outfit-ninja" class="outfit">
            <!-- Capucha shinobi -->
            <polygon points="62,42 74,10 94,32" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
            <polygon points="158,42 146,10 126,32" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
            <path fill-rule="evenodd"
                  d="M110,8 Q175,18 178,85 Q176,124 144,134 Q110,142 76,134 Q44,124 42,85 Q45,18 110,8 Z
                     M110,46 Q158,50 158,90 Q156,120 110,126 Q64,120 62,90 Q62,50 110,46 Z"
                  fill="#37474f" stroke="#263238" stroke-width="2"/>
            <!-- Máscara sobre la boca -->
            <path d="M63,92 Q66,118 110,124 Q154,118 157,92 Q140,110 110,110 Q80,110 63,92 Z" fill="#37474f"/>
            <!-- Banda con placa -->
            <path d="M72,46 Q110,36 148,46 L164,60 Q110,48 56,60 Z" fill="#c62828"/>
            <path d="M72,46 Q110,36 148,46" fill="none" stroke="#8e1b1b" stroke-width="2"/>
            <rect x="96" y="42" width="28" height="12" rx="3" fill="#cfd8dc" stroke="#78909c" stroke-width="1.5"/>
            <line x1="101" y1="46" x2="119" y2="45" stroke="#eceff1" stroke-width="2" stroke-linecap="round"/>
            <circle cx="166" cy="55" r="5.5" fill="#8e1b1b"/>
            <path d="M166,53 Q186,50 199,36 L193,32 Q183,44 164,49 Z" fill="#b71c1c"/>
            <path d="M167,57 Q190,62 201,56 L198,64 Q186,68 165,62 Z" fill="#b71c1c"/>
          </g>
          <g id="outfit-futbol" class="outfit">
            <!-- Capucha de sudadera deportiva -->
            <polygon points="62,42 74,10 94,32" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
            <polygon points="158,42 146,10 126,32" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
            <path fill-rule="evenodd"
                  d="M110,8 Q175,18 178,85 Q176,124 144,134 Q110,142 76,134 Q44,124 42,85 Q45,18 110,8 Z
                     M110,46 Q158,50 158,90 Q156,120 110,126 Q64,120 62,90 Q62,50 110,46 Z"
                  fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
            <!-- Ribete blanco alrededor de la cara -->
            <path d="M62,90 Q62,50 110,46 Q158,50 158,90" fill="none" stroke="#fafafa" stroke-width="3" opacity="0.9"/>
            <!-- Banda deportiva -->
            <path d="M72,46 Q110,36 148,46 L164,62 Q110,50 56,62 Z" fill="#fafafa" stroke="#78909c" stroke-width="1.5"/>
            <path d="M64,53 Q110,42 156,53 L160,58 Q110,47 60,58 Z" fill="#2e7d32"/>
          </g>
          <g id="outfit-pirata" class="outfit">
            <!-- Bandana que envuelve la cabeza -->
            <polygon points="62,42 74,10 94,32" fill="#c62828" stroke="#8e1b1b" stroke-width="1.5"/>
            <polygon points="158,42 146,10 126,32" fill="#c62828" stroke="#8e1b1b" stroke-width="1.5"/>
            <path fill-rule="evenodd"
                  d="M110,8 Q175,18 178,85 Q176,124 144,134 Q110,142 76,134 Q44,124 42,85 Q45,18 110,8 Z
                     M110,46 Q158,50 158,90 Q156,120 110,126 Q64,120 62,90 Q62,50 110,46 Z"
                  fill="#c62828" stroke="#8e1b1b" stroke-width="2"/>
            <!-- Lunares -->
            <circle cx="85" cy="24" r="2.5" fill="#ffffff" opacity="0.9"/>
            <circle cx="118" cy="16" r="2" fill="#ffffff" opacity="0.9"/>
            <circle cx="148" cy="36" r="2.5" fill="#ffffff" opacity="0.9"/>
            <circle cx="58" cy="62" r="2" fill="#ffffff" opacity="0.9"/>
            <circle cx="164" cy="72" r="2.5" fill="#ffffff" opacity="0.9"/>
            <circle cx="99" cy="34" r="1.8" fill="#ffffff" opacity="0.9"/>
            <!-- Nudo con colas cayendo -->
            <circle cx="53" cy="103" r="5" fill="#8e1b1b"/>
            <path d="M51,106 Q41,118 46,131 L52,128 Q48,118 56,108 Z" fill="#b71c1c"/>
            <path d="M56,108 Q54,122 62,131 L67,127 Q60,119 61,109 Z" fill="#b71c1c"/>
            <!-- Parche -->
            <ellipse cx="86" cy="78" rx="15" ry="16" fill="#16151a" stroke="#cfd8dc" stroke-width="1.5"/>
            <path d="M75,73 Q86,68 97,73" fill="none" stroke="#37474f" stroke-width="1.5" opacity="0.8"/>
          </g>
          <g id="outfit-mago" class="outfit">
            <!-- Capucha de túnica -->
            <path fill-rule="evenodd"
                  d="M110,8 Q175,18 178,85 Q176,124 144,134 Q110,142 76,134 Q44,124 42,85 Q45,18 110,8 Z
                     M110,46 Q158,50 158,90 Q156,120 110,126 Q64,120 62,90 Q62,50 110,46 Z"
                  fill="#5e35b1" stroke="#4527a0" stroke-width="2"/>
            <text x="64" y="76" font-size="8" fill="#ffd54f">✦</text>
            <text x="148" y="82" font-size="7" fill="#ffd54f">✦</text>
            <text x="160" y="106" font-size="6" fill="#ffe082">✦</text>
            <!-- Sombrero puntiagudo sobre la capucha -->
            <path d="M70,28 L106,1 Q110,-1 114,1 L150,28 Q110,18 70,28 Z" fill="#5e35b1" stroke="#b39ddb" stroke-width="1.5"/>
            <path d="M78,23 Q110,14 142,23" fill="none" stroke="#ffd54f" stroke-width="2"/>
            <ellipse cx="110" cy="30" rx="52" ry="9" fill="#5e35b1" stroke="#b39ddb" stroke-width="1.5"/>
            <ellipse cx="110" cy="32" rx="49" ry="6.5" fill="#4527a0" opacity="0.35"/>
            <text x="100" y="20" font-size="8" fill="#ffd54f">✦</text>
          </g>
          <g id="outfit-capucha" class="outfit">
            <!-- Orejitas de la capucha -->
            <polygon points="62,42 74,10 94,32" fill="#f5f5f5" stroke="#cfd8dc" stroke-width="1.5"/>
            <polygon points="158,42 146,10 126,32" fill="#f5f5f5" stroke="#cfd8dc" stroke-width="1.5"/>
            <!-- Capucha que envuelve la cara -->
            <path fill-rule="evenodd"
                  d="M110,8 Q175,18 178,85 Q176,124 144,134 Q110,142 76,134 Q44,124 42,85 Q45,18 110,8 Z
                     M110,46 Q158,50 158,90 Q156,120 110,126 Q64,120 62,90 Q62,50 110,46 Z"
                  fill="#f5f5f5" stroke="#cfd8dc" stroke-width="2"/>
            <!-- Pliegue de la tela -->
            <path d="M70,60 Q110,42 150,60" fill="none" stroke="#b0bec5" stroke-width="3" opacity="0.5"/>
          </g>
        </g>

        <!-- Patitas colgando sobre la pantalla -->
        <g id="paws">
          <g class="paw">
            <rect x="66" y="126" width="30" height="26" rx="13" fill="var(--fur)"/>
            <line x1="76" y1="138" x2="76" y2="150" stroke="var(--fur-line)" stroke-width="2"/>
            <line x1="86" y1="138" x2="86" y2="150" stroke="var(--fur-line)" stroke-width="2"/>
          </g>
          <g class="paw">
            <rect x="124" y="126" width="30" height="26" rx="13" fill="var(--fur)"/>
            <line x1="134" y1="138" x2="134" y2="150" stroke="var(--fur-line)" stroke-width="2"/>
            <line x1="144" y1="138" x2="144" y2="150" stroke="var(--fur-line)" stroke-width="2"/>
          </g>
        </g>

        <!-- Balón y muñequeras del futbolero (fuera de la cabeza: acompañan a las patas) -->
        <g id="outfit-futbol-ball" class="outfit">
          <circle cx="38" cy="136" r="13" fill="#fafafa" stroke="#455a64" stroke-width="1.5"/>
          <polygon points="38,130 33,134 35,140 41,140 43,134" fill="#263238"/>
          <g stroke="#455a64" stroke-width="1.5">
            <line x1="38" y1="130" x2="38" y2="124"/>
            <line x1="33" y1="134" x2="27" y2="131"/>
            <line x1="35" y1="140" x2="31" y2="146"/>
            <line x1="41" y1="140" x2="45" y2="146"/>
            <line x1="43" y1="134" x2="49" y2="131"/>
          </g>
          <path d="M28,128 Q33,122 40,123" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
          <!-- Muñequeras -->
          <rect x="66" y="124" width="30" height="7" rx="3.5" fill="#2e7d32" stroke="#1b5e20" stroke-width="1"/>
          <rect x="124" y="124" width="30" height="7" rx="3.5" fill="#2e7d32" stroke="#1b5e20" stroke-width="1"/>
          <line x1="70" y1="127.5" x2="92" y2="127.5" stroke="#fafafa" stroke-width="1.5"/>
          <line x1="128" y1="127.5" x2="150" y2="127.5" stroke="#fafafa" stroke-width="1.5"/>
        </g>

        <!-- Vendas ninja en las patas -->
        <g id="outfit-ninja-paws" class="outfit">
          <rect x="66" y="129" width="30" height="6" fill="#455a64"/>
          <rect x="66" y="138" width="30" height="5" fill="#455a64" opacity="0.85"/>
          <rect x="124" y="129" width="30" height="6" fill="#455a64"/>
          <rect x="124" y="138" width="30" height="5" fill="#455a64" opacity="0.85"/>
        </g>

        <!-- Garfio y pañoleta del pirata -->
        <g id="outfit-pirata-paws" class="outfit">
          <rect x="124" y="124" width="30" height="7" rx="3.5" fill="#263238" stroke="#c9a227" stroke-width="1"/>
          <path d="M139,131 Q140,144 133,147 Q126,148 125,141" fill="none" stroke="#b0bec5" stroke-width="4" stroke-linecap="round"/>
          <!-- Pañoleta en la cola -->
          <path d="M188,132 L206,127 L208,136 L190,141 Z" fill="#c62828"/>
          <circle cx="205" cy="131" r="3" fill="#8e1b1b"/>
          <path d="M206,131 Q215,137 213,146" fill="none" stroke="#b71c1c" stroke-width="4" stroke-linecap="round"/>
        </g>

        <!-- Puños de mago -->
        <g id="outfit-mago-paws" class="outfit">
          <rect x="64" y="124" width="34" height="9" rx="4" fill="#5e35b1" stroke="#b39ddb" stroke-width="1.2"/>
          <rect x="122" y="124" width="34" height="9" rx="4" fill="#5e35b1" stroke="#b39ddb" stroke-width="1.2"/>
          <text x="76" y="132" font-size="7" fill="#ffd54f">✦</text>
          <text x="134" y="132" font-size="7" fill="#ffd54f">✦</text>
        </g>

        <!-- Puños y faja del encapuchado -->
        <g id="outfit-capucha-extra" class="outfit">
          <rect x="64" y="124" width="34" height="8" rx="4" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1.2"/>
          <rect x="122" y="124" width="34" height="8" rx="4" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1.2"/>
          <path d="M188,132 L206,128 L207,137 L189,141 Z" fill="#c62828"/>
          <path d="M205,132 Q214,138 212,147" fill="none" stroke="#b71c1c" stroke-width="4" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <!-- Pantalla -->
    <div class="display">
      <button id="btn-frac" class="frac-chip hidden" title="Ver como fracción / decimal">¼</button>
      <div id="expression" class="expression">&nbsp;</div>
      <div id="result" class="result" title="Tocar para copiar">0</div>
    </div>

    <!-- Controles -->
    <div class="calc-controls">
      <button id="btn-mode" class="ctrl-btn" title="Cambiar modo">🔬 Científica</button>
      <button id="btn-notes" class="ctrl-btn" title="Bloc de notas">📝 Notas</button>
      <button id="btn-angle" class="ctrl-btn" title="Grados / Radianes">DEG</button>
      <span id="mem-chip" class="mem-chip" title="Memoria activa">M</span>
    </div>

    <div class="pad-wrap">
      <!-- Teclado científico -->
      <div id="sci-pad" class="sci-pad hidden">
        <button class="skey mem" data-action="mc">MC</button>
        <button class="skey mem" data-action="mr">MR</button>
        <button class="skey mem" data-action="m+">M+</button>
        <button class="skey mem" data-action="m-">M−</button>
        <button class="skey mem" data-action="ms">MS</button>

        <button id="btn-2nd" class="skey">2nd</button>
        <button class="skey fn" data-k="sin(" data-k2="asin(" data-label="sin" data-label2="sin⁻¹">sin</button>
        <button class="skey fn" data-k="cos(" data-k2="acos(" data-label="cos" data-label2="cos⁻¹">cos</button>
        <button class="skey fn" data-k="tan(" data-k2="atan(" data-label="tan" data-label2="tan⁻¹">tan</button>
        <button class="skey fn" data-k="π" data-label="π">π</button>

        <button class="skey fn" data-k="^" data-label="xʸ">xʸ</button>
        <button class="skey fn" data-k="ln(" data-k2="e^(" data-label="ln" data-label2="eˣ">ln</button>
        <button class="skey fn" data-k="log(" data-k2="10^(" data-label="log" data-label2="10ˣ">log</button>
        <button class="skey fn" data-k="sqrt(" data-k2="cbrt(" data-label="√" data-label2="∛">√</button>
        <button class="skey fn" data-k="e" data-label="e">e</button>

        <button class="skey fn" data-k="^2" data-k2="^3" data-label="x²" data-label2="x³">x²</button>
        <button class="skey fn" data-k="(" data-label="(">(</button>
        <button class="skey fn" data-k=")" data-label=")">)</button>
        <button class="skey fn" data-k="^(-1)" data-label="1/x">1/x</button>
        <button class="skey fn" data-k="!" data-label="n!">n!</button>

        <button class="skey fn" data-k="abs(" data-label="|x|">|x|</button>
        <button class="skey fn" data-k="*10^" data-label="EXP">EXP</button>
        <button class="skey fn" data-k="mod" data-label="mod">mod</button>
        <button class="skey fn" data-k="%" data-label="%">%</button>
        <button class="skey fn" data-k="ans" data-label="Ans">Ans</button>
      </div>

      <!-- Teclado básico -->
      <div class="keypad">
        <button class="key key-fn" data-action="clear">C</button>
        <button class="key key-fn" data-action="back">⌫</button>
        <button class="key key-fn" data-k="%">%</button>
        <button class="key key-op" data-k="/">÷</button>

        <button class="key" data-k="7">7</button>
        <button class="key" data-k="8">8</button>
        <button class="key" data-k="9">9</button>
        <button class="key key-op" data-k="*">×</button>

        <button class="key" data-k="4">4</button>
        <button class="key" data-k="5">5</button>
        <button class="key" data-k="6">6</button>
        <button class="key key-op" data-k="-">−</button>

        <button class="key" data-k="1">1</button>
        <button class="key" data-k="2">2</button>
        <button class="key" data-k="3">3</button>
        <button class="key key-op" data-k="+">+</button>

        <button class="key" data-action="negate">±</button>
        <button class="key" data-k="0">0</button>
        <button class="key" data-k=".">.</button>
        <button class="key key-eq" data-action="equals">=</button>
      </div>
    </div>

    <footer class="footer">Hecho con 🐾 y mucho ronroneo</footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
